# Build and deploy to GitHub Pages so you can open the game on your phone.
# 1. Push this repo to GitHub.
# 2. In repo: Settings → Pages → Source: "GitHub Actions".
# 3. Deploy: push to main, or run manually (Actions → "Deploy to GitHub Pages" → Run workflow).
#    Then open https://<YOUR_USERNAME>.github.io/<REPO_NAME>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  # Run without committing: Actions tab → this workflow → Run workflow
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Base path for GitHub Pages: /<repo-name>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
